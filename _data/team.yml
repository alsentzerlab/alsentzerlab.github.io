  - name: Lucy Yin
    photo: Headshot_Lucy.jpg
    role: DBDS Masters Student
    cheese: "🧀 brie"
    bio: >
      Lucy is a first year Master’s student in the Department of Biomedical Data Science. Her current research interests include classifying query ambiguity in LLMs and evaluating how underspecification affects downstream information retrieval in clinical settings. She is passionate about safe and equitable AI deployment in healthcare. She previously received her B.S. in Computational and Systems Biology at the University of California, Los Angeles (UCLA). 


