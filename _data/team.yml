pi:
  - name: Dr. Emily Alsentzer
    photo: emilyalsentzer.jpg
    url: https://emilyalsentzer.com/
    role: Assistant Professor, Biomedical Data Science & Computer Science, Stanford
    bio: >
      Emily Alsentzer, PhD is an Assistant Professor of Biomedical Data Science and, by courtesy,
      of Computer Science at Stanford University. Previously, she was a postdoctoral fellow at
      Brigham and Women's Hospital and Harvard Medical School (HMS) where she worked to deploy ML
      models within the Mass General Brigham healthcare system. She received her PhD from the
      Health Science & Technology (HST) program at MIT & HMS, co-advised by Zak Kohane and Pete Szolovits.
    cheese: "🧀 aged gouda"

postdocs:
  - name: Chloe Stanwyck
    photo: Headshot_Chloe.jpg
    role: Postdoctoral Researcher
    cheese: "🧀 Aged gouda"
    bio: >
      Chloe is a postdoc in the Departments of Biomedical Data Science and Obstetric Anesthesiology. She received her MD and MS in Biomedical Informatics from Stanford University and completed her anesthesiology residency at Massachusetts General Hospital, after which she practiced as an attending in the Bay Area at Kaiser Permanente and Highland Hospital. She subsequently returned to Stanford for subspecialty training in obstetric anesthesiology before starting her research postdoc.

phd:
  - name: Jordan Cahoon
    photo: jordancahoon.jpg
    url: https://www.jordancahoon.com/
    role: PhD Student, Biomedical Data Science
    cheese: "🧀 goat"
    bio: >
      Jordan is a second-year PhD student in the Department of Biomedical Data Science. She is broadly interested in developing methods to reason over longitudinal clinical records and integrate these insights with patient molecular data. She earned a B.S. in Computer Science with a minor in Computational Biology from the University of Southern California.

  - name: Fiona X. Cai
    photo: FionaCai.jpg
    url: https://fionacai.com/
    role: PhD Student, Biomedical Data Science
    cheese: "🧀 halloumi"
    bio: >
      Fiona is a second-year PhD student in the Department of Biomedical Data Science. Her research focuses on knowledge-grounded language model systems for biomedical reasoning, with a focus on rare disease diagnosis. She is also interested in multimodal retrieval and reasoning, particularly for biomedical visual question answering. She previously received her B.S. and M.Eng. in Computer Science from MIT.

